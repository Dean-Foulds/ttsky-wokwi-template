project:
  wokwi_id: 458425259629456385  # keep your existing ID

  title: "4-Stage Pipelined Binary Perceptron"
  author: "Dean Foulds"
  discord: ""
  description: "A pipelined 1-bit neural network neuron with 8 binary weights and a programmable threshold. Classifies an 8-bit input vector every clock cycle after a 4-cycle warmup."
  language: "Wokwi"
  clock_hz: 10000
  tiles: "1x1"

pinout:
  # Inputs
  ui[0]: "x0 - feature bit 0"
  ui[1]: "x1 - feature bit 1"
  ui[2]: "x2 - feature bit 2"
  ui[3]: "x3 - feature bit 3"
  ui[4]: "x4 - feature bit 4"
  ui[5]: "x5 - feature bit 5"
  ui[6]: "x6 - feature bit 6"
  ui[7]: "x7 - feature bit 7"

  # Outputs
  uo[0]: "fire - classification result"
  uo[1]: "sum0 - weighted sum bit 0"
  uo[2]: "sum1 - weighted sum bit 1"
  uo[3]: "sum2 - weighted sum bit 2"
  uo[4]: "sum3 - weighted sum bit 3"
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: "mode - 0=load, 1=infer"
  uio[1]: "target - 0=weights, 1=threshold"
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

yaml_version: 6