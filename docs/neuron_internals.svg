<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="40" y="40" width="80" height="220" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" x="80" y="75" text-anchor="middle">x[7:0]</text>
<text font-family="sans-serif" font-size="12" fill="#0F6E56" x="80" y="95" text-anchor="middle">inputs</text>
<text font-family="sans-serif" font-size="12" fill="#0F6E56" x="80" y="120" text-anchor="middle">x7</text>
<text font-family="sans-serif" font-size="12" fill="#0F6E56" x="80" y="145" text-anchor="middle">x6</text>
<text font-family="sans-serif" font-size="12" fill="#0F6E56" x="80" y="170" text-anchor="middle">...</text>
<text font-family="sans-serif" font-size="12" fill="#0F6E56" x="80" y="195" text-anchor="middle">x1</text>
<text font-family="sans-serif" font-size="12" fill="#0F6E56" x="80" y="220" text-anchor="middle">x0</text>

<rect x="40" y="275" width="80" height="30" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="11" fill="#085041" x="80" y="291" text-anchor="middle" dominant-baseline="central">w[7:0] reg</text>

<line x1="120" y1="120" x2="180" y2="120" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="120" y1="150" x2="180" y2="150" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="120" y1="195" x2="180" y2="195" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="120" y1="220" x2="180" y2="220" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="120" y1="290" x2="180" y2="150" stroke="#1D9E75" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<rect x="180" y="60" width="130" height="200" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489" x="245" y="88" text-anchor="middle">AND array</text>
<text font-family="sans-serif" font-size="12" fill="#534AB7" x="245" y="108" text-anchor="middle">8 gates</text>
<text font-family="sans-serif" font-size="12" fill="#534AB7" x="245" y="135" text-anchor="middle">x7 AND w7</text>
<text font-family="sans-serif" font-size="12" fill="#534AB7" x="245" y="158" text-anchor="middle">x6 AND w6</text>
<text font-family="sans-serif" font-size="12" fill="#534AB7" x="245" y="181" text-anchor="middle">...</text>
<text font-family="sans-serif" font-size="12" fill="#534AB7" x="245" y="204" text-anchor="middle">x0 AND w0</text>
<text font-family="sans-serif" font-size="11" fill="#3C3489" x="245" y="238" text-anchor="middle">p[i] = xi AND wi</text>

<line x1="310" y1="160" x2="360" y2="160" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="360" y="90" width="120" height="140" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489" x="420" y="118" text-anchor="middle">Adder tree</text>
<text font-family="sans-serif" font-size="12" fill="#534AB7" x="420" y="140" text-anchor="middle">popcount</text>
<text font-family="sans-serif" font-size="12" fill="#534AB7" x="420" y="163" text-anchor="middle">S = sum p[i]</text>
<text font-family="sans-serif" font-size="12" fill="#534AB7" x="420" y="186" text-anchor="middle">S in {0..8}</text>
<text font-family="sans-serif" font-size="11" fill="#3C3489" x="420" y="212" text-anchor="middle">i = 0..7</text>

<line x1="480" y1="160" x2="520" y2="160" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="520" y="110" width="110" height="100" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13" x="575" y="143" text-anchor="middle">Comparator</text>
<text font-family="sans-serif" font-size="12" fill="#993C1D" x="575" y="165" text-anchor="middle">S &gt;= theta ?</text>
<text font-family="sans-serif" font-size="12" fill="#993C1D" x="575" y="187" text-anchor="middle">fire = y[n]</text>

<rect x="540" y="228" width="70" height="28" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="11" fill="#085041" x="575" y="242" text-anchor="middle" dominant-baseline="central">theta[3:0]</text>
<line x1="575" y1="228" x2="575" y2="210" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<text font-family="sans-serif" font-size="12" fill="#444441" x="340" y="300" text-anchor="middle">y[n] = 1 if sum(wi AND xi) &gt;= theta[n], else 0</text>
</svg>
